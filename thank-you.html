<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Received - Galaxy Fashion BD</title>
  <link rel="stylesheet" href="styles.css" />




  <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    fbq('init', '2210960613003223');
    fbq('track', 'PageView');
    </script>

    <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2210960613003223&ev=PageView&noscript=1"/>

</head>
<body>

  <!-- Thank You Page Start -->
  <section class="thank-you-page">
    <div class="thank-you-card">

      <div class="thank-you-icon">
        <img src="assets/check.png" alt="Order Success Icon">
      </div>

      <h1>ধন্যবাদ!</h1>
      <h2>আপনার অর্ডার সফলভাবে গ্রহণ করা হয়েছে</h2>

      <p>
        আমাদের টিম খুব শীঘ্রই আপনার মোবাইল নম্বরে যোগাযোগ করবে।
        অর্ডার কনফার্ম হওয়ার পর পণ্য ডেলিভারি করা হবে।
      </p>

      <div class="thank-you-info">
        <div class="thank-you-info-item">
          <img src="assets/icon-fast-delivery.svg" alt="Delivery Icon">
          <span>ঢাকার ভিতরে: ১-২ দিন</span>
        </div>

        <div class="thank-you-info-item">
          <img src="assets/icon-fast-delivery.svg" alt="Delivery Icon">
          <span>ঢাকার বাইরে: ৩-৪ দিন</span>
        </div>

        <div class="thank-you-info-item">
          <img src="assets/icon-cash-on-delivery.svg" alt="Cash On Delivery Icon">
          <span>Cash On Delivery Available</span>
        </div>
      </div>

      <a href="/" class="thank-you-btn">হোম পেজে ফিরে যান</a>

    </div>
  </section>
  <!-- Thank You Page End -->






  
  <script>
(function () {
  let pixelData = {
    value: 0,
    currency: "BDT",
    content_name: "Galaxy Fashion BD Order",
    content_ids: ["galaxy-fashion-product"],
    content_type: "product",
    contents: [
      {
        id: "galaxy-fashion-product",
        quantity: 1
      }
    ],
    num_items: 1
  };

  try {
    const savedData = sessionStorage.getItem("gfbd_pixel_order_data");

    if (savedData) {
      pixelData = JSON.parse(savedData);
    }
  } catch (error) {
    console.warn("Pixel order data not found", error);
  }

  if (typeof fbq === "function") {
    fbq("track", "Purchase", pixelData);
  }

  sessionStorage.removeItem("gfbd_pixel_order_data");
})();
</script>

</body>
</html>
